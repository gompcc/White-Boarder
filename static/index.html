<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>White Boarder</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body>
  <!-- Session picker (shown when no active session) -->
  <div id="session-picker" class="session-picker">
    <h1>White Boarder</h1>
    <div class="session-actions">
      <input type="text" id="session-name" placeholder="Session name">
      <button id="btn-new-session" onclick="newSession()">New Session</button>
    </div>
    <div id="session-list"></div>
  </div>

  <!-- Main workspace (shown during active session) -->
  <div id="workspace" class="workspace hidden">
    <div class="main-grid">
      <!-- Left 2/3: Diagram -->
      <div class="panel diagram-panel">
        <div class="panel-header">
          <span id="session-title">Diagram</span>
          <span id="diagram-type-badge" class="badge"></span>
          <button id="btn-mirror" class="toggle active" onclick="toggleMirror()" title="Mirror whiteboard layout">Mirror</button>
        </div>
        <div id="diagram-container" class="diagram-container">
          <div id="mermaid-output" class="mermaid-output"></div>
          <p id="diagram-placeholder" class="placeholder">
            Capture your whiteboard to generate a diagram
          </p>
        </div>
      </div>

      <!-- Right 1/3: split into suggestions (top) and questions (bottom) -->
      <div class="panel suggestions-panel">
        <div class="panel-header">Suggestions</div>
        <div id="suggestions-list" class="item-list">
          <p class="placeholder">Suggestions will appear after first capture</p>
        </div>
      </div>

      <div class="panel questions-panel">
        <div class="panel-header">Questions</div>
        <div id="questions-list" class="item-list">
          <p class="placeholder">Questions will appear after first capture</p>
        </div>
      </div>
    </div>

    <!-- Bottom bar: text input + actions -->
    <div class="bottom-bar">
      <input type="text" id="text-input" placeholder="Add context about what you're whiteboarding..."
             onkeydown="if(event.key==='Enter' && !event.shiftKey) addContext()">
      <button id="btn-capture" onclick="doCapture()" title="Capture whiteboard (Ctrl+Space)">
        Capture
      </button>
      <button id="btn-end" onclick="endSession()" class="btn-secondary">
        End Session
      </button>
    </div>

    <!-- Loading overlay -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Analyzing whiteboard...</p>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
